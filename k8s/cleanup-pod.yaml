apiVersion: v1
kind: Pod
metadata:
  name: kafka-cleanup
  namespace: globeco
spec:
  restartPolicy: Never
  nodeSelector:
    kubernetes.io/hostname: node-3
  hostPID: true
  hostNetwork: true
  securityContext:
    runAsUser: 0
    runAsGroup: 0
    fsGroup: 0
  containers:
  - name: cleanup
    image: busybox
    securityContext:
      privileged: true
      runAsUser: 0
    command:
    - /bin/sh
    - -c
    - |
      echo "Cleaning Kafka data directory..."
      cd /mnt/disk1/kafka-execution-service
      rm -rf * .[!.]* 2>/dev/null || true
      echo "Directory cleaned"
      ls -la
      echo "Setting permissions..."
      chown -R 1000:1000 /mnt/disk1/kafka-execution-service
      echo "Done"
    volumeMounts:
    - name: kafka-data
      mountPath: /mnt/disk1/kafka-execution-service
  volumes:
  - name: kafka-data
    hostPath:
      path: /mnt/disk1/kafka-execution-service
      type: Directory